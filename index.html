<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامه مطالعه فاینال</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --border: #2a2a32;
    --accent-hw:  #ff7043;
    --accent-s1:  #4fc3f7;
    --accent-s2:  #a78bfa;
    --accent-s3:  #f9a825;
    --accent-s4:  #66bb6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --done-bg: #1a1f1a;
    --done-text: #3a3a4a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header p { font-size: 0.85rem; color: var(--muted); }

  .progress-bar-wrap {
    max-width: 480px; margin: 20px auto 0;
    background: var(--border); border-radius: 4px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4fc3f7, #a78bfa);
    border-radius: 4px; transition: width 0.4s ease; width: 0%;
  }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 8px;
  }

  .section { max-width: 480px; margin: 0 auto 28px; }

  .section-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; padding: 3px 8px;
    border-radius: 3px; text-transform: uppercase; white-space: nowrap;
  }
  .tag-hw { background:#ff704322; color:var(--accent-hw); border:1px solid #ff704344; }
  .tag-s1  { background:#4fc3f722; color:var(--accent-s1); border:1px solid #4fc3f744; }
  .tag-s2  { background:#a78bfa22; color:var(--accent-s2); border:1px solid #a78bfa44; }
  .tag-s3  { background:#f9a82522; color:var(--accent-s3); border:1px solid #f9a82544; }
  .tag-s4  { background:#66bb6a22; color:var(--accent-s4); border:1px solid #66bb6a44; }

  .section-title { font-size: 0.9rem; font-weight: 600; color: var(--text); }
  .date-range {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; color: var(--muted); margin-left: auto;
  }
  .exam-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem; color: #ff7043;
    background: #ff704318; border: 1px solid #ff704333;
    border-radius: 3px; padding: 2px 7px; white-space: nowrap;
  }

  /* ADD LESSON BUTTON */
  .add-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 12px;
    background: transparent; border: 1px dashed var(--border);
    border-radius: 6px; cursor: pointer;
    color: var(--muted); font-size: 0.8rem;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    margin-top: 4px;
  }
  .add-btn:hover { border-color: var(--muted); color: var(--text); }
  .add-btn .plus { font-size: 1rem; line-height: 1; }

  /* INLINE ADD FORM */
  .add-form {
    display: none; gap: 6px; margin-top: 4px;
    align-items: center;
  }
  .add-form.open { display: flex; }
  .add-form input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.85rem;
    outline: none;
  }
  .add-form input:focus { border-color: var(--muted); }
  .add-form input::placeholder { color: var(--muted); }
  .add-form button {
    padding: 7px 12px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 0.8rem; font-family: 'Inter', sans-serif;
  }
  .add-form .confirm-btn { background: #a78bfa33; color: #a78bfa; }
  .add-form .cancel-btn  { background: transparent; color: var(--muted); }

  /* ITEM ROW */
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 6px; margin-bottom: 4px;
    border: 1px solid transparent;
    transition: background 0.15s;
    position: relative;
  }
  .item:hover { background: var(--surface); border-color: var(--border); }
  .item:hover .remove-btn { opacity: 1; }

  .item.done { background: var(--done-bg); border-color: transparent; }
  .item.done .item-label { color: var(--done-text); text-decoration: line-through; }
  .item.done .item-sub   { color: #2a2a36; }

  .checkbox {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: transparent; cursor: pointer;
  }
  .item.done .checkbox { background: #2a2a36; border-color: #2a2a36; }
  .checkbox svg { display: none; }
  .item.done .checkbox svg { display: block; }

  .item-text { flex: 1; cursor: pointer; }
  .item-label { font-size: 0.875rem; color: var(--text); transition: color 0.15s; }
  .item-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; color: var(--muted); margin-top: 2px; transition: color 0.15s;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-hw { background: var(--accent-hw); }
  .dot-s1 { background: var(--accent-s1); }
  .dot-s2 { background: var(--accent-s2); }
  .dot-s3 { background: var(--accent-s3); }
  .dot-s4 { background: var(--accent-s4); }

  /* REMOVE BUTTON */
  .remove-btn {
    opacity: 0; transition: opacity 0.15s;
    background: transparent; border: none; cursor: pointer;
    color: #ff704366; font-size: 1rem; padding: 2px 4px;
    line-height: 1; flex-shrink: 0;
  }
  .remove-btn:hover { color: #ff7043; }

  .confetti-msg {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem; color: #a78bfa;
    margin-top: 32px; opacity: 0; transition: opacity 0.5s;
  }
  .confetti-msg.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>📋 Final Exam Plan · ترم چهار</h1>
  <p>Tir 5 → Tir 29 &nbsp;·&nbsp; Check off each task as you go</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 0 done</div>
</header>

<div id="sections-container"></div>
<div class="confetti-msg" id="doneMsg">🎉 همه تیک زدی! موفق باشی زین!</div>

<script>
// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEFAULT_SECTIONS = [
  {
    id: 'hw',
    tag: 'tag-hw', tagLabel: '🚨 Do First',
    title: 'Pending Homework', dateRange: 'by Tir 8', examBadge: '',
    dotClass: 'dot-hw',
    defaultSub: 'record & send',
    items: [
      { label: '综合 — Voice messages', sub: 'record & send · 中级口语 II', done: false },
      { label: '口语 — One voice message', sub: 'record & send · speaking HW', done: false },
      { label: '写作 — Short essay', sub: 'write & submit · ~45 min', done: false },
    ]
  },
  {
    id: 's1',
    tag: 'tag-s1', tagLabel: '听力与阅读',
    title: 'Listening & Reading', dateRange: 'Tir 9–19', examBadge: 'Exam Tir 20',
    dotClass: 'dot-s1',
    defaultSub: 'vocab · listening · reading',
    items: [
      { label: 'Lesson 1',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 2',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 3',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 4',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 5',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 6',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 7',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 8',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 9',          sub: 'vocab · listening · reading', done: false },
      { label: 'Lesson 10 (Part 1)',sub: 'vocab · listening · reading', done: false },
      { label: 'Full review pass',  sub: 'mock listening practice · day before exam', done: false },
    ]
  },
  {
    id: 's2',
    tag: 'tag-s2', tagLabel: '综合',
    title: 'Comprehensive Chinese', dateRange: 'Tir 14–21', examBadge: 'Exam Tir 22',
    dotClass: 'dot-s2',
    defaultSub: 'vocab · grammar · exercises',
    items: [
      { label: 'Lesson 19', sub: 'vocab · grammar · exercises', done: false },
      { label: 'Lesson 20', sub: 'vocab · grammar · exercises', done: false },
      { label: 'Lesson 21', sub: 'vocab · grammar · exercises', done: false },
      { label: 'Lesson 22', sub: 'vocab · grammar · exercises', done: false },
      { label: 'Lesson 23', sub: 'vocab · grammar · exercises', done: false },
      { label: 'Lesson 24', sub: 'vocab · grammar · exercises', done: false },
      { label: 'Full review pass', sub: 'key grammar patterns · day before exam', done: false },
    ]
  },
  {
    id: 's3',
    tag: 'tag-s3', tagLabel: '写作',
    title: 'Writing', dateRange: 'Tir 18–23', examBadge: 'Exam Tir 24',
    dotClass: 'dot-s3',
    defaultSub: 'topics · sentence patterns · review essay',
    items: [
      { label: 'Lesson 5',      sub: 'topics · sentence patterns · review essay', done: false },
      { label: 'Lesson 6',      sub: 'topics · sentence patterns · review essay', done: false },
      { label: 'Lesson 7',      sub: 'topics · sentence patterns · review essay', done: false },
      { label: 'Lesson 8',      sub: 'topics · sentence patterns · review essay', done: false },
      { label: 'Lesson 9',      sub: 'topics · sentence patterns · review essay', done: false },
      { label: 'Lesson 10',     sub: 'topics · sentence patterns · review essay', done: false },
      { label: 'Practice essay',sub: 'write one full essay under timed conditions', done: false },
    ]
  },
  {
    id: 's4',
    tag: 'tag-s4', tagLabel: '口语',
    title: 'Speaking', dateRange: 'Tir 24–28', examBadge: 'Exam Tir 29',
    dotClass: 'dot-s4',
    defaultSub: 'درس کلمات اول · practice saying aloud',
    items: [
      { label: 'Lesson 1 — vocab only', sub: 'درس کلمات اول · practice saying aloud', done: false },
      { label: 'Lesson 2 — vocab only', sub: 'درس کلمات اول · practice saying aloud', done: false },
      { label: 'Lesson 3 — vocab only', sub: 'درس کلمات اول · practice saying aloud', done: false },
      { label: 'Lesson 4 — vocab only', sub: 'درس کلمات اول · practice saying aloud', done: false },
      { label: 'Lesson 5 — vocab only', sub: 'درس کلمات اول · practice saying aloud', done: false },
      { label: 'Full speaking run-through', sub: 'say all key vocab aloud · record yourself', done: false },
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const saved = localStorage.getItem('zayn-finals-v2');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
}

function saveState() {
  try { localStorage.setItem('zayn-finals-v2', JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

// ─── RENDER ───────────────────────────────────────────────────────────────────
const CHECK_SVG = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#6b6b80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderAll() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  state.forEach((sec, si) => {
    container.appendChild(renderSection(sec, si));
  });
  updateProgress();
}

function renderSection(sec, si) {
  const div = document.createElement('div');
  div.className = 'section';

  // Header
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <span class="tag ${sec.tag}">${sec.tagLabel}</span>
    <span class="section-title">${sec.title}</span>
    <span class="date-range">${sec.dateRange}</span>
    ${sec.examBadge ? `<span class="exam-badge">${sec.examBadge}</span>` : ''}
  `;
  div.appendChild(header);

  // Items
  const itemsWrap = document.createElement('div');
  itemsWrap.className = 'items-wrap';
  sec.items.forEach((item, ii) => {
    itemsWrap.appendChild(renderItem(item, si, ii, sec.dotClass));
  });
  div.appendChild(itemsWrap);

  // Add form
  const addForm = document.createElement('div');
  addForm.className = 'add-form';
  addForm.id = `add-form-${si}`;
  addForm.innerHTML = `
    <input type="text" placeholder="Lesson name…" id="add-input-${si}" />
    <button class="confirm-btn" onclick="confirmAdd(${si})">Add</button>
    <button class="cancel-btn"  onclick="cancelAdd(${si})">✕</button>
  `;
  div.appendChild(addForm);

  // Add button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.innerHTML = `<span class="plus">＋</span> Add lesson`;
  addBtn.onclick = () => openAdd(si);
  div.appendChild(addBtn);

  return div;
}

function renderItem(item, si, ii, dotClass) {
  const div = document.createElement('div');
  div.className = 'item' + (item.done ? ' done' : '');

  div.innerHTML = `
    <div class="checkbox" onclick="toggleItem(${si},${ii})">${CHECK_SVG}</div>
    <div class="dot ${dotClass}"></div>
    <div class="item-text" onclick="toggleItem(${si},${ii})">
      <div class="item-label">${escHtml(item.label)}</div>
      <div class="item-sub">${escHtml(item.sub)}</div>
    </div>
    <button class="remove-btn" title="Remove" onclick="removeItem(${si},${ii})">✕</button>
  `;
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function toggleItem(si, ii) {
  state[si].items[ii].done = !state[si].items[ii].done;
  saveState();
  renderAll();
}

function removeItem(si, ii) {
  state[si].items.splice(ii, 1);
  saveState();
  renderAll();
}

function openAdd(si) {
  const form = document.getElementById(`add-form-${si}`);
  form.classList.add('open');
  document.getElementById(`add-input-${si}`).focus();
}

function cancelAdd(si) {
  const form = document.getElementById(`add-form-${si}`);
  form.classList.remove('open');
  document.getElementById(`add-input-${si}`).value = '';
}

function confirmAdd(si) {
  const input = document.getElementById(`add-input-${si}`);
  const label = input.value.trim();
  if (!label) return;
  state[si].items.push({ label, sub: state[si].defaultSub, done: false });
  saveState();
  renderAll();
  // Re-open form so user can add more if they want
}

// Enter key submits add form
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const active = document.activeElement;
    if (active && active.id && active.id.startsWith('add-input-')) {
      const si = parseInt(active.id.replace('add-input-', ''));
      confirmAdd(si);
    }
  }
  if (e.key === 'Escape') {
    state.forEach((_, si) => cancelAdd(si));
  }
});

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function updateProgress() {
  const allItems = state.flatMap(s => s.items);
  const total = allItems.length;
  const done  = allItems.filter(i => i.done).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} done  (${pct}%)`;
  document.getElementById('doneMsg').classList.toggle('show', done === total && total > 0);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
